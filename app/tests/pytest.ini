# Autor: Daniel Dedek

[pytest]

markers =
    unit:        Jednotkove testy – testuji izolovane tridy a funkce bez IO
    integration: Integracni testy – testuji spolupraci vice komponent
    e2e:         End-to-end testy – testuji cely pruchod s realnymi soubory
    inference:   Inference testy
    whisper:     Testy pouzivajici model Whisper
    canary:      Testy pouzivajici model Canary
    parakeet:    Testy pouzivajici model Parakeet

addopts = -v --tb=short

testpaths = app/tests
